server {
    listen 80;
    listen [::]:80;
    server_name _;

    location = / {
        return 302 /Tickify-SWP-Web-App/Login.jsp;
    }

    location /Tickify-SWP-Web-App/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 80;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    ssl_certificate /etc/ssl/certs/tickify-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/tickify-selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location = / {
        return 302 /Tickify-SWP-Web-App/Login.jsp;
    }

    location /Tickify-SWP-Web-App/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect http://$host/ https://$host/;
        proxy_redirect http://127.0.0.1:8080/ https://$host/;
    }
}
