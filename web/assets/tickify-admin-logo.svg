<svg viewBox="0 0 480 100" xmlns="http://www.w3.org/2000/svg" width="480" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;700&display=swap');
    </style>
    <filter id="tagShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#BFC6D0" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Ticket tag body -->
  <path d="M 14,22 Q 14,12 24,12 L 72,12 L 96,50 L 72,88 L 24,88 Q 14,88 14,78 Z"
    fill="#F2F4F7" stroke="#D6DAE2" stroke-width="1.5" filter="url(#tagShadow)"/>

  <!-- Punch hole -->
  <circle cx="30" cy="50" r="6" fill="#FFFFFF" stroke="#CDD1DA" stroke-width="1.5"/>

  <!-- Dashed tear line -->
  <line x1="52" y1="12" x2="52" y2="88" stroke="#D6DAE2" stroke-width="1.2" stroke-dasharray="3.5,3"/>

  <!-- T lettermark -->
  <line x1="64" y1="34" x2="85" y2="34" stroke="#A5AFBC" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="74.5" y1="34" x2="74.5" y2="65" stroke="#A5AFBC" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="74.5" cy="73" r="3.5" fill="#BFC8D4"/>

  <!-- Wordmark -->
  <text x="112" y="64"
    font-family="'Sora', sans-serif"
    font-size="42"
    font-weight="300"
    letter-spacing="-1.5"
    fill="#68778D">Ticki</text>
  <text x="224" y="64"
    font-family="'Sora', sans-serif"
    font-size="42"
    font-weight="700"
    letter-spacing="-1.5"
    fill="#3B4A5C">fy</text>

  <!-- Divider -->
  <line x1="282" y1="28" x2="282" y2="72" stroke="#DDE1E8" stroke-width="1.5"/>

  <!-- Shield icon -->
  <path d="M 304,30 L 322,30 L 322,52 Q 322,62 313,66 Q 304,62 304,52 Z"
    fill="#EDF0F4" stroke="#C5CBDA" stroke-width="1.5"/>
  <polyline points="308,49 312,54 320,41"
    fill="none" stroke="#8A97AA" stroke-width="2.2"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Admin text -->
  <text x="332" y="64"
    font-family="'Sora', sans-serif"
    font-size="32"
    font-weight="700"
    letter-spacing="3"
    fill="#8A97AA">ADMIN</text>
</svg>
