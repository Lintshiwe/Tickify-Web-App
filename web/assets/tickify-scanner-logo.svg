<svg viewBox="0 0 500 100" xmlns="http://www.w3.org/2000/svg" width="500" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;700&display=swap');
    </style>
    <filter id="tagShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#BFC6D0" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Ticket tag body -->
  <path d="M 14,22 Q 14,12 24,12 L 72,12 L 96,50 L 72,88 L 24,88 Q 14,88 14,78 Z"
    fill="#F2F4F7" stroke="#D6DAE2" stroke-width="1.5" filter="url(#tagShadow)"/>
  <circle cx="30" cy="50" r="6" fill="#FFFFFF" stroke="#CDD1DA" stroke-width="1.5"/>
  <line x1="52" y1="12" x2="52" y2="88" stroke="#D6DAE2" stroke-width="1.2" stroke-dasharray="3.5,3"/>
  <line x1="64" y1="34" x2="85" y2="34" stroke="#A5AFBC" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="74.5" y1="34" x2="74.5" y2="65" stroke="#A5AFBC" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="74.5" cy="73" r="3.5" fill="#BFC8D4"/>

  <!-- Wordmark -->
  <text x="112" y="64" font-family="'Sora', sans-serif" font-size="42" font-weight="300" letter-spacing="-1.5" fill="#68778D">Ticki</text>
  <text x="224" y="64" font-family="'Sora', sans-serif" font-size="42" font-weight="700" letter-spacing="-1.5" fill="#3B4A5C">fy</text>

  <!-- Divider -->
  <line x1="282" y1="28" x2="282" y2="72" stroke="#DDE1E8" stroke-width="1.5"/>

  <!-- Scanner icon -->
  <rect x="298" y="28" width="36" height="44" rx="5" ry="5" fill="#EDF0F4" stroke="#C5CBDA" stroke-width="1.5"/>
  <rect x="304" y="34" width="24" height="18" rx="3" ry="3" fill="#FFFFFF" stroke="#D0D5DF" stroke-width="1"/>
  <line x1="304" y1="43" x2="328" y2="43" stroke="#A5AFBC" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="3,2"/>
  <rect x="309" y="60" width="14" height="9" rx="3" ry="3" fill="#D6DAE4" stroke="#C5CBDA" stroke-width="1"/>
  <line x1="305" y1="26" x2="305" y2="20" stroke="#B0BACA" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="310" y1="26" x2="310" y2="18" stroke="#B0BACA" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="315" y1="26" x2="315" y2="16" stroke="#B0BACA" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="320" y1="26" x2="320" y2="18" stroke="#B0BACA" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="325" y1="26" x2="325" y2="20" stroke="#B0BACA" stroke-width="1.5" stroke-linecap="round"/>

  <!-- SCANNER text -->
  <text x="344" y="64" font-family="'Sora', sans-serif" font-size="30" font-weight="700" letter-spacing="3" fill="#8A97AA">SCANNER</text>
</svg>
